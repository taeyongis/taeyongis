<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>WYLD</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">

  <div class="title">
    TAEYONG IS:
    <span id="changing-word">ART</span>
  </div>

  <button class="toggle-btn">
    ON/OFF
  </button>

</header>

<main class="hero">

  <div class="carousel-container">

    <button class="arrow left-arrow">
      ←
    </button>

    <button class="arrow right-arrow">
      →
    </button>

    <div class="avatars">

      <div class="avatar">
        <img src="images/wyld.png">
      </div>

      <div class="avatar">
        <img src="images/shalala.png">
      </div>

      <div class="avatar">
        <img src="images/tap.png">
      </div>

      <div class="avatar">
        <img src="images/nct.png">
      </div>

      <div class="avatar">
        <img src="images/neo.png">
      </div>

    </div>

  </div>

  <div class="music-player">

    <div class="play-button">
      ▶
    </div>

    <div class="song-info">
      <h3>TAEYONG</h3>
      <p>WYLD</p>
    </div>

  </div>

</main>

<script src="script.js"></script>

</body>
</html>
