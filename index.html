<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>WYLD</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">

  <div class="title">
    TAEYONG IS:
    <span id="changing-word">ART</span>
  </div>

  <button class="toggle-btn">
    ON/OFF
  </button>

</header>

<script>

const words = [
  "ART",
  "NEO",
  "SHALALA",
  "TAP",
  "VISIONARY",
  "WYLD"
];

let index = 0;

const changingWord = document.getElementById("changing-word");

const interval = setInterval(() => {

  index++;

  changingWord.textContent = words[index];

  if(index === words.length - 1){
    clearInterval(interval);
  }

}, 1500);

</script>

</body>
</html>
