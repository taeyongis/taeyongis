<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>WYLD</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">

  <div class="title">
    TAEYONG IS:
    <span id="changing-word">ART</span>
  </div>

  <button class="toggle-btn">
    ON/OFF
  </button>

</header>

  <main class="hero">

  <div class="avatars">

    <div class="avatar">
      <img src="https://i.imgur.com/qK42fUQ.png">
    </div>

    <div class="avatar">
      <img src="https://i.imgur.com/7Wxq4Wl.png">
    </div>

    <div class="avatar">
      <img src="https://i.imgur.com/jkS5rL0.png">
    </div>

    <div class="avatar">
      <img src="https://i.imgur.com/XjQ1F2i.png">
    </div>

    <div class="avatar">
      <img src="https://i.imgur.com/zAZkM7T.png">
    </div>

  </div>

  <div class="music-player">

    <div class="play-button">
      ▶
    </div>

    <div class="song-info">
      <h3>TAEYONG</h3>
      <p>WYLD</p>
    </div>

  </div>

</main>

<script>

const words = [
  "ART",
  "NEO",
  "SHALALA",
  "TAP",
  "VISIONARY",
  "WYLD"
];

let index = 0;

const changingWord = document.getElementById("changing-word");

const interval = setInterval(() => {

  index++;

  changingWord.textContent = words[index];

  if(index === words.length - 1){
    clearInterval(interval);
  }

}, 1500);

</script>

</body>
</html>
