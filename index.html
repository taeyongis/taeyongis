<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>WYLD</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">

  <div class="title">
    TAEYONG IS:
    <span id="changing-word">ART</span>
  </div>

  <button class="toggle-btn">
    ON/OFF
  </button>

</header>

<main class="hero">

  <div class="carousel-container">

    <button class="arrow left-arrow">
      ←
    </button>

    <button class="arrow right-arrow">
      →
    </button>

    <div class="avatars">

      <div class="avatar">
        <img src="images/wyld.png">
      </div>

      <div class="avatar">
        <img src="images/shalala.png">
      </div>

      <div class="avatar">
        <img src="images/tap.png">
      </div>

      <div class="avatar">
        <img src="images/nct.png">
      </div>

      <div class="avatar">
        <img src="images/neo.png">
      </div>

    </div>

  </div>

  <section class="stream-section">

  <h2>STREAM WYLD</h2>

  <div class="stream-grid">

    <!-- YOUTUBE -->

    <div class="stream-card">

      <h3>YOUTUBE STATION</h3>

      <iframe
        src="https://www.youtube.com/embed/videoseries?si=fV4ZNHRour9KuRQU&amp;list=PLUpvLGhxomja2StOrjlCcmWlRdf2Q5Qlv"
        title="YouTube video player"
        frameborder="0"
        allowfullscreen>
      </iframe>

    </div>

    <!-- SPOTIFY -->

    <div class="stream-card">

      <h3>SPOTIFY STATION</h3>

<iframe data-testid="embed-iframe" style="border-radius:12px" src="https://open.spotify.com/embed/playlist/37i9dQZF1DZ06evO44iGSm?utm_source=generator" width="100%" height="352" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
    </div>

  </div>

</section>

</main>

<script src="script.js"></script>

</body>
</html>
